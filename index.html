<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karol Design Profissional</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #faf8f6; color: #333; margin: 0; }
    .logo-neon { color: #ff007f; text-shadow: 0 0 10px #ff007f, 0 0 20px #ff66b2; animation: neon-glow 1.5s ease-in-out infinite alternate; }
    @keyframes neon-glow { from { text-shadow: 0 0 10px #ff007f; } to { text-shadow: 0 0 20px #ff66b2, 0 0 30px #ff99cc; } }
    .slogan { font-family: 'Great Vibes', cursive; color: #8B4789; font-size: 1.5rem; }
    .btn-primary { background: #8B4789; color: #fff; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: none; transition: 0.3s; }
    .btn-primary:active { transform: scale(0.98); background: #713870; }
    .tab-btn { padding: 15px; border: none; background: transparent; cursor: pointer; border-radius: 12px; color: #64748b; flex: 1; display: flex; justify-content: center; }
    .tab-btn.active { background: #8B4789; color: #fff !important; }
    .form-card { background: #fff; border-radius: 24px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); max-width: 500px; margin: 0 auto; }
    input, select { width: 100%; padding: 12px; margin: 8px 0 18px; border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
    .gallery-item { aspect-ratio: 1; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #eee; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(220, 38, 38, 0.8); color: white; border: none; padding: 6px; border-radius: 50%; }
  </style>
 </head>
 <body class="h-full overflow-auto">
  <header class="bg-white border-b sticky top-0 z-50 py-6 px-4 text-center">
    <div class="max-w-xl mx-auto">
      <h1 class="text-3xl font-bold logo-neon">Karol Design Profissional</h1>
      <p class="slogan mt-1">A beleza que seus olhos merecem</p>
      <nav class="flex gap-2 mt-8 bg-gray-50 p-1.5 rounded-2xl">
        <button id="btn-booking" onclick="showTab('booking')" class="tab-btn active"><i data-lucide="calendar"></i></button> 
        <button id="btn-appointments" onclick="showTab('appointments')" class="tab-btn"><i data-lucide="list"></i></button> 
        <button id="btn-gallery" onclick="showTab('gallery')" class="tab-btn"><i data-lucide="image"></i></button>
      </nav>
    </div>
  </header>

  <main class="max-w-xl mx-auto p-6">
    <div id="booking-tab">
      <div class="form-card">
        <h2 class="text-center font-bold text-xl mb-6">Novo Agendamento</h2>
        <form onsubmit="handleBooking(event)">
          <label class="text-xs font-bold uppercase text-gray-400">Nome da Cliente</label>
          <input type="text" id="client-name" placeholder="Nome completo" required>
          <label class="text-xs font-bold uppercase text-gray-400">Serviço</label>
          <select id="service-select" required>
             <option value="Design nos Cílios">Design nos Cílios</option>
             <option value="Design nas Sobrancelhas">Design nas Sobrancelhas</option>
             <option value="Limpeza de Pele">Limpeza de Pele</option>
          </select>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="text-xs font-bold uppercase text-gray-400">Data</label><input type="date" id="booking-date" required></div>
            <div><label class="text-xs font-bold uppercase text-gray-400">Hora</label><input type="time" id="booking-time" required></div>
          </div>
          <button type="submit" id="submit-btn" class="btn-primary w-full justify-center mt-6">Confirmar Horário</button>
        </form>
      </div>
    </div>

    <div id="appointments-tab" class="hidden">
      <h2 class="font-bold text-xl mb-6">Agendamentos</h2>
      <div id="appointments-list" class="space-y-4"></div>
    </div>

    <div id="gallery-tab" class="hidden">
      <div class="flex justify-between items-center mb-8">
        <h2 class="font-bold text-xl">Portfólio</h2>
        <input type="file" id="media-input" accept="image/*" class="hidden" onchange="uploadPhoto(event)">
        <button onclick="document.getElementById('media-input').click()" id="upload-btn" class="btn-primary text-sm">Adicionar Foto</button>
      </div>
      <div id="gallery-grid" class="gallery"></div>
    </div>
  </main>

  <script>
    let dbData = [];

    window.onload = async () => {
      if(window.lucide) lucide.createIcons();
      try {
        if (window.dataSdk) {
          await window.dataSdk.init({ onDataChanged: (data) => { dbData = data || []; render(); } });
        }
      } catch (e) { console.error("Erro ao iniciar SDK:", e); }
    };

    function render() {
      const appList = document.getElementById('appointments-list');
      const apps = dbData.filter(d => d.type === 'appointment');
      appList.innerHTML = apps.map(a => `
        <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
          <div><p class="font-bold">${a.name || 'Sem nome'}</p><p class="text-sm text-[#ff007f]">${a.service || 'Serviço'}</p><p class="text-xs text-gray-400">${a.date} às ${a.time}</p></div>
          <button onclick="deleteItem('${a.id}')" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2"></i></button>
        </div>`).join('') || '<p class="text-center text-gray-400">Nenhum agendamento encontrado.</p>';

      const galGrid = document.getElementById('gallery-grid');
      const photos = dbData.filter(d => d.type === 'photo');
      galGrid.innerHTML = photos.map(p => `
        <div class="gallery-item"><img src="${p.url}"><button onclick="deleteItem('${p.id}')" class="delete-btn">X</button></div>`).join('');
      
      if(window.lucide) lucide.createIcons();
    }

    async function handleBooking(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.innerText = "Salvando...";
      btn.disabled = true;

      try {
        const payload = {
          type: 'appointment',
          name: document.getElementById('client-name').value,
          service: document.getElementById('service-select').value,
          date: document.getElementById('booking-date').value,
          time: document.getElementById('booking-time').value
        };

        if (window.dataSdk) {
          await window.dataSdk.create(payload);
          e.target.reset();
          showTab('appointments');
        } else {
          alert("O sistema de dados não carregou. Tente atualizar a página.");
        }
      } catch (err) {
        console.error("Erro ao salvar:", err);
        alert("Erro ao salvar o horário.");
      } finally {
        btn.innerText = "Confirmar Horário";
        btn.disabled = false;
      }
    }

    async function uploadPhoto(event) {
      const file = event.target.files[0];
      if (!file || !window.dataSdk) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        const canvas = document.createElement('canvas');
        const img = new Image();
        img.src = e.target.result;
        img.onload = async () => {
          const max = 600;
          let w = img.width, h = img.height;
          if (w > max) { h *= max/w; w = max; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          await window.dataSdk.create({ type: 'photo', url: canvas.toDataURL('image/jpeg', 0.5) });
        };
      };
      reader.readAsDataURL(file);
    }

    async function deleteItem(id) {
      if(confirm("Apagar?") && window.dataSdk) {
        const item = dbData.find(d => d.id === id);
        if(item) await window.dataSdk.delete(item);
      }
    }

    function showTab(id) {
      ['booking', 'appointments', 'gallery'].forEach(t => {
        document.getElementById(t + '-tab').classList.toggle('hidden', t !== id);
        document.getElementById('btn-' + t).classList.toggle('active', t === id);
      });
      if(window.lucide) lucide.createIcons();
    }
  </script>
 </body>
</html>
